/* ================= VARIABLES ================= */  
:root {  
  --neon: #ff34b3;  
  --glass: rgba(255, 255, 255, 0.05);  
  --glass-border: rgba(255, 255, 255, 0.1);  
  --text: #ffffff;  
}  
  
/* ================= RESET & BASE ================= */  
* {  
  box-sizing: border-box;  
  -webkit-tap-highlight-color: transparent;  
  outline: none;  
}  
  
body {  
  margin: 0;  
  height: 100vh;  
  font-family: 'Segoe UI', system-ui, sans-serif;  
  background-color: #000;  
  color: var(--text);  
  overflow: hidden;  
  transition: background 0.5s ease;  
    
  /* DEFAULT FALLBACK */  
  background-image: url("wall.jpg");  
  background-size: cover;  
  background-position: center;  
  background-attachment: fixed;  
}  
  
/* ================= LIVE WALLPAPER (VIDEO) ================= */  
#bg-video {  
  position: fixed;  
  right: 0;  
  bottom: 0;  
  min-width: 100%;  
  min-height: 100%;  
  z-index: -1;  
  object-fit: cover;  
  filter: brightness(0.7);  
  display: none; /* Hidden by default */  
}  
  
/* ================= UI LAYOUT ================= */  
.container {  
  height: 100%;  
  display: flex;  
  flex-direction: column;  
  align-items: center;  
  justify-content: space-between;  
  padding: 20px;  
  position: relative;  
  z-index: 2;  
}  
    /* Layout toggle button – panel matched */
.layout-btn {
  width: 100%;
  margin: 10px 0;
  font-size: 16px;
  font-weight: 500;
}

/* Optional: thoda special feel */
.layout-btn.locked {
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
}

.layout-btn.unlocked {
  box-shadow: 0 0 12px rgba(255, 0, 180, 0.35);
}
  
/* ================= TOP BAR ================= */  
.top-bar {  
  width: 100%;  
  display: flex;  
  justify-content: space-between;  
  align-items: center;  
  padding: 10px 5px;  
}  
  
.weather-badge {  
  background: var(--glass);  
  backdrop-filter: blur(15px);  
  -webkit-backdrop-filter: blur(15px);  
  padding: 8px 16px;  
  border-radius: 30px;  
  border: 1px solid var(--glass-border);  
  font-size: 14px;  
  font-weight: 500;  
  display: flex;  
  align-items: center;  
  gap: 8px;  
}  
  
.settings-btn {  
  font-size: 22px;  
  cursor: pointer;  
  transition: transform 0.5s ease;  
  padding: 10px;  
  text-shadow: 0 0 10px rgba(0,0,0,0.5);  
}  
.settings-btn:hover { transform: rotate(90deg); color: var(--neon); }  
  
/* ================= CENTER STAGE ================= */  
.center-stage {  
  display: flex;  
  flex-direction: column;  
  align-items: center;  
  width: 100%;  
  max-width: 500px;  
  perspective: 1000px;  
}  
  
/* ================= CLOCK ================= */  
.clock-card {  
  text-align: center;  
  margin-bottom: 40px;  
  cursor: grab;  
}  
  
.greeting {  
  font-size: 19px;  
  color: var(--neon);  
  margin-bottom: 5px;  
  letter-spacing: 2px;  
  text-transform: uppercase;  
  font-weight: 700;  
  text-shadow: 0 0 15px rgba(0, 255, 213, 0.6);  
}  
  
#time {  
  font-size: 72px;  
  font-weight: 800;  
  background: linear-gradient(to bottom, #fff, #aaa);  
  -webkit-background-clip: text;  
  -webkit-text-fill-color: transparent;  
  filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));  
}  
  
#date { font-size: 16px; opacity: 0.8; letter-spacing: 1px; }  
  
/* ================= SEARCH ================= */  
.search-wrapper {  
  position: relative;  
  width: 100%;  
}  
  
.search-box {  
  width: 100%;  
  background: rgba(0, 0, 0, 0.6);  
  backdrop-filter: blur(20px);  
  border: 1px solid var(--glass-border);  
  border-radius: 25px;  
  padding: 18px 50px 18px 25px;  
  color: #fff;  
  font-size: 18px;  
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);  
  transition: all 0.3s ease;  
}  
  
.search-box:focus {  
  background: rgba(0, 0, 0, 0.85);  
  box-shadow: 0 15px 50px rgba(0, 255, 213, 0.15), inset 0 0 0 1px var(--neon);  
}  
  
.voice-icon {  
  position: absolute;  
  right: 20px;  
  top: 50%;  
  transform: translateY(-50%);  
  color: #aaa;  
  cursor: pointer;  
  font-size: 20px;  
}  
.voice-icon.listening { color: #ff0055; animation: pulse 1s infinite; }  
  
@keyframes pulse {  
  0% { transform: translateY(-50%) scale(1); }  
  50% { transform: translateY(-50%) scale(1.2); }  
  100% { transform: translateY(-50%) scale(1); }  
}  
  
/* ================= SPEED DIAL ================= */  
.speed-dial {  
  display: flex;  
  gap: 20px;  
  margin-top: 40px;  
}  
  
.app-icon {  
  width: 50px;  
  height: 50px;  
  background: var(--glass);  
  backdrop-filter: blur(10px);  
  border-radius: 15px;  
  display: flex;  
  justify-content: center;  
  align-items: center;  
  font-size: 22px;  
  color: #fff;  
  border: 1px solid var(--glass-border);  
  transition: all 0.3s;  
  text-decoration: none;  
}  
  
.app-icon:hover {  
  background: var(--neon);  
  color: #000;  
  transform: translateY(-5px);  
}  
  
input[type="file"] { display: none; }

</div>  <input type="file" id="wallPicker" accept="image/*,video/*">  <script>  
/* ================= 1. HYBRID WALLPAPER ENGINE ================= */  
const wallPicker = document.getElementById('wallPicker');  
const bgVideo = document.getElementById('bg-video');  
const settingsBtn = document.getElementById('settingsBtn');  
  
/* 🔁 RESET TO DEFAULT */  
function resetToDefaultWall() {  
  bgVideo.pause();  
  bgVideo.removeAttribute("src");  
  bgVideo.load();  
  bgVideo.style.display = "none";  
  document.body.style.backgroundImage = 'url("wall.jpg")';  
  localStorage.removeItem("ultraWall");  
  localStorage.removeItem("ultraWallType");  
}  
  
/* ⚙ SETTINGS CLICK */  
settingsBtn.onclick = () => wallPicker.click();  
  
/* 🔄 AUTO LOAD ON START */  
window.addEventListener("load", () => {  
  try {  
    const savedType = localStorage.getItem("ultraWallType");  
    const savedWall = localStorage.getItem("ultraWall");  
  
    if (savedWall) {  
      if (savedType === "video") {  
        document.body.style.backgroundImage = 'none';  
        bgVideo.src = savedWall;  
        bgVideo.style.display = "block";  
        bgVideo.play().catch(e => console.log("Autoplay policy restricted"));  
      } else if (savedType === "image") {  
        bgVideo.style.display = "none";  
        document.body.style.backgroundImage = `url(${savedWall})`;  
      }  
    } else {  
      resetToDefaultWall();  
    }  
  } catch (e) {  
    console.error(e);  
    resetToDefaultWall();  
  }  
});  
  
/* 📂 FILE PICKER LOGIC */  
wallPicker.onchange = e => {  
  const file = e.target.files[0];  
  if (!file) return;  
  
  // === IMAGE HANDLING ===  
  if (file.type.startsWith("image/")) {  
    const reader = new FileReader();  
    reader.onload = () => {  
      try {  
        localStorage.setItem("ultraWall", reader.result);  
        localStorage.setItem("ultraWallType", "image");  
        document.body.style.backgroundImage = `url(${reader.result})`;  
        bgVideo.style.display = "none";  
      } catch (err) {  
        alert("Image too big! Using temporarily.");  
        document.body.style.backgroundImage = `url(${reader.result})`;  
      }  
    };  
    reader.readAsDataURL(file);  
  }  
  
  // === VIDEO HANDLING ===  
  else if (file.type.startsWith("video/")) {  
    // 1. Show Immediately (Temp Preview)  
    const tempUrl = URL.createObjectURL(file);  
    bgVideo.src = tempUrl;  
    bgVideo.style.display = "block";  
    bgVideo.play();  
    document.body.style.backgroundImage = 'none';  
  
    // 2. Check Size (Limit 3.5MB for storage safety)  
    if (file.size > 3.5 * 1024 * 1024) {  
      alert("⚠️ Video > 3.5MB. It will run temporarily (Not Saved).");  
      return;   
    }  
  
    // 3. Check Duration  
    const videoChecker = document.createElement('video');  
    videoChecker.preload = 'metadata';  
    videoChecker.onloadedmetadata = function() {  
      window.URL.revokeObjectURL(videoChecker.src);  
      if (videoChecker.duration > 15) {   
        alert("⚠️ Video > 15s. It will run temporarily.");  
      } else {  
        // 4. Save if small & short  
        const reader = new FileReader();  
        reader.readAsDataURL(file);  
        reader.onload = () => {  
          try {  
            localStorage.setItem("ultraWall", reader.result);  
            localStorage.setItem("ultraWallType", "video");  
            alert("✅ Video Saved Permanently!");  
          } catch (err) {  
            alert("❌ Storage Full! Running temporary mode.");  
            localStorage.removeItem("ultraWall");  
          }  
        };  
      }  
    };  
    videoChecker.src = URL.createObjectURL(file);  
  }  
};  
  
/* ================= 2. CLOCK & GREETING ================= */  
function updateTime() {  
  const now = new Date();  
  const hours = now.getHours();  
    
  document.getElementById('time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });  
  document.getElementById('date').innerText = now.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });  
  
  let greet = "HELLO SHISHUPAL";  
  if(hours < 12) greet = "SHRI RADHE";  
  else if(hours < 18) greet = "OM NAMAH SHIVAAY";  
  else greet = "MERE KRISHNA";  
    
  document.getElementById('greeting').innerText = greet;  
}  
setInterval(updateTime, 1000); updateTime();  
  
/* ================= 3. WEATHER ================= */  
const weatherEl = document.getElementById('weather');  
if(navigator.geolocation) {  
    navigator.geolocation.getCurrentPosition(async position => {  
      try {  
        const { latitude, longitude } = position.coords;  
        const req = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&units=metric&appid=f1f5a371042922700734867c52f50526`);  
        const data = await req.json();  
        weatherEl.innerHTML = `<i class="fas fa-sun"></i> <span>${Math.round(data.main.temp)}°C • ${data.name}</span>`;  
      } catch(e) { weatherEl.innerHTML = `<i class="fas fa-times"></i> Offline`; }  
    });  
}  
  
/* ================= 4. SEARCH & VOICE ================= */  
const searchInput = document.getElementById('searchInput');  
const micBtn = document.getElementById('micBtn');  
  
searchInput.addEventListener('keydown', (e) => {  
  if(e.key === 'Enter' && searchInput.value) {  
    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(searchInput.value)}`;  
  }  
});  
  
if ('webkitSpeechRecognition' in window) {  
  const recognition = new webkitSpeechRecognition();  
  recognition.continuous = false;  
  micBtn.onclick = () => { recognition.start(); micBtn.classList.add('listening'); };  
  recognition.onresult = (e) => {  
    const txt = e.results[0][0].transcript;  
    searchInput.value = txt;  
    micBtn.classList.remove('listening');  
    setTimeout(() => window.location.href = `https://www.google.com/search?q=${encodeURIComponent(txt)}`, 800);  
  };  
  recognition.onend = () => micBtn.classList.remove('listening');  
} else { micBtn.style.display = 'none'; }  
  
/* ================= 5. TILT & DRAG UI ================= */  
const card = document.getElementById('tiltCard');  
document.addEventListener('mousemove', (e) => {  
  const x = (window.innerWidth / 2 - e.pageX) / 25;  
  const y = (window.innerHeight / 2 - e.pageY) / 25;  
  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;  
});  
  
function makeDrag(elmnt) {  
  let pos1=0, pos2=0, pos3=0, pos4=0;  
  elmnt.ondblclick = function() {  
      elmnt.style.cursor = "move";  
      elmnt.style.border = "1px dashed var(--neon)";  
      elmnt.onmousedown = dragMouseDown;  
  };  
  function dragMouseDown(e) {  
    e = e || window.event; e.preventDefault();  
    pos3 = e.clientX; pos4 = e.clientY;  
    document.onmouseup = closeDragElement;  
    document.onmousemove = elementDrag;  
  }  
  function elementDrag(e) {  
    e = e || window.event; e.preventDefault();  
    pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;  
    pos3 = e.clientX; pos4 = e.clientY;  
    elmnt.style.top = (elmnt.offsetTop - pos2) + "px";  
    elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";  
    elmnt.style.position = "absolute";  
  }  
  function closeDragElement() {  
    document.onmouseup = null; document.onmousemove = null;  
    elmnt.style.border = "none"; elmnt.style.cursor = "grab";  
  }  
}  
makeDrag(document.getElementById("clockBox"));  
makeDrag(document.getElementById("searchWrap"));  
</script>
