<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shishupal King 🪄</title>

<style>
:root{
  --neon:#00ffd5;
  --glass:rgba(0,0,0,.45);
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  font-family:system-ui, sans-serif;
  background:
    linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.8)),
    url("wall.jpg") center/cover no-repeat;
  color:#fff;
}

.container{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:18px;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.weather{
  padding:6px 14px;
  border-radius:20px;
  background:var(--glass);
  backdrop-filter:blur(10px);
  font-size:14px;
}

/* CLOCK */
.clock{
  text-align:center;
  margin-top:40px;
}

#time{
  font-size:56px;
  font-weight:700;
  color:var(--neon);
  text-shadow:0 0 25px var(--neon);
}

#date{
  opacity:.7;
  margin-top:6px;
}

/* SEARCH */
.search{
  margin:30px auto 0;
  width:100%;
  max-width:380px;
}

.search input{
  width:100%;
  padding:16px;
  border:none;
  outline:none;
  border-radius:18px;
  background:var(--glass);
  backdrop-filter:blur(12px);
  font-size:17px;
  color:white;
  caret-color:#00ffd5;

  /* 🔑 KEYBOARD FIX */
  -webkit-text-security:none;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  opacity:.6;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="top">
    <div class="weather">☁ 11°C</div>
    <div>⚙</div>
  </div>

  <div class="clock">
    <div id="time">00:00</div>
    <div id="date">Loading...</div>
  </div>

  <div class="search">
    <input id="search"
      type="search"
      inputmode="search"
      autocomplete="off"
      placeholder="Search Google…">
  </div>

  <div class="footer">⚡ Focus Home • Offline • Clean</div>

</div>

<script>
/* CLOCK */
function updateClock(){
  const d=new Date();
  time.textContent=d.toLocaleTimeString([],{
    hour:'2-digit',minute:'2-digit'
  });
  date.textContent=d.toDateString();
}
setInterval(updateClock,1000);updateClock();

/* RGB TYPING INSIDE INPUT */
const input=document.getElementById("search");

input.addEventListener("input",()=>{
  const hue=Math.floor(Math.random()*360);
  input.style.color=`hsl(${hue},100%,70%)`;
  input.style.textShadow=`0 0 10px hsl(${hue},100%,70%)`;
});

/* SEARCH */
input.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    location.href=
      "https://www.google.com/search?q="+
      encodeURIComponent(input.value);
  }
});
</script>

</body>
</html>
