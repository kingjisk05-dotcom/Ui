<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Home Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#00ffff;
  --glass: rgba(0,0,0,0.45);
  --blur: blur(14px);
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
    url("wall.jpg") center/cover no-repeat;
  color:#fff;
}

.container{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.weather{
  background:var(--glass);
  backdrop-filter:var(--blur);
  padding:8px 14px;
  border-radius:20px;
  font-size:14px;
}

/* CLOCK */
.clock{
  text-align:center;
  margin-top:50px;
}

#time{
  font-size:54px;
  font-weight:600;
  letter-spacing:2px;
  color:var(--accent);
  text-shadow:0 0 25px var(--accent);
}

#date{
  opacity:.7;
  margin-top:6px;
}

/* SEARCH */
.search{
  margin:40px auto 0;
  width:100%;
  max-width:400px;
}

.searchBox{
  width:100%;
  padding:16px;
  border-radius:18px;
  border:none;
  outline:none;
  font-size:16px;
  background:var(--glass);
  backdrop-filter:var(--blur);
  color:#fff;
  caret-color:var(--accent);
}

/* RGB typing effect */
.rgb-preview{
  text-align:center;
  margin-top:10px;
  min-height:22px;
  font-size:15px;
  word-break:break-word;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  opacity:.6;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="top">
    <div class="weather">☁ 11°C</div>
    <div>⚙</div>
  </div>

  <!-- CLOCK -->
  <div class="clock">
    <div id="time">00:00</div>
    <div id="date">Loading...</div>
  </div>

  <!-- SEARCH -->
  <div class="search">
    <input id="search"
      class="searchBox"
      placeholder="Search Google..."
      autocomplete="off">
    <div class="rgb-preview" id="rgbText"></div>
  </div>

  <div class="footer">⚡ Focus Home • Offline • Minimal</div>

</div>

<script>
/* 🔹 LIVE CLOCK */
function updateClock(){
  const d=new Date();
  time.innerText=d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  date.innerText=d.toDateString();
}
setInterval(updateClock,1000);
updateClock();

/* 🔹 GOOGLE SEARCH */
search.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    location.href='https://www.google.com/search?q='+encodeURIComponent(search.value);
  }
});

/* 🔹 RGB PER LETTER EFFECT */
search.addEventListener('input',()=>{
  rgbText.innerHTML='';
  [...search.value].forEach(ch=>{
    const span=document.createElement('span');
    const hue=Math.floor(Math.random()*360);
    span.style.color=`hsl(${hue},100%,65%)`;
    span.textContent=ch;
    rgbText.appendChild(span);
  });
});

/* 🔹 WALLPAPER BASE COLOR (SIMULATED SMART PICK) */
const accents=[
  '#00ffff','#00ff9c','#ff4ecd','#ffaa00','#8b5cff'
];
document.documentElement.style.setProperty(
  '--accent',
  accents[Math.floor(Math.random()*accents.length)]
);

/* 🔹 OFFLINE CACHE */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>

</body>
</html>
