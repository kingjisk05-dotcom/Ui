<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Home Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --glass: rgba(0,0,0,0.45);
  --blur: blur(12px);
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
    url("wall.jpg") center/cover no-repeat;
  color:#fff;
}

.container{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
}

/* 🔹 TOP WIDGET (Edge style) */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.weather{
  background:var(--glass);
  backdrop-filter:var(--blur);
  padding:8px 14px;
  border-radius:20px;
  font-size:14px;
}

/* 🔹 CLOCK */
.clock{
  text-align:center;
  margin-top:40px;
}

#time{
  font-size:52px;
  font-weight:600;
  letter-spacing:2px;
  text-shadow:0 0 20px rgba(0,255,255,.6);
}

#date{
  opacity:.75;
  margin-top:4px;
}

/* 🔹 SEARCH */
.search{
  margin:30px auto 0;
  width:100%;
  max-width:380px;
}

.search input{
  width:100%;
  padding:15px;
  border-radius:16px;
  border:none;
  outline:none;
  font-size:16px;
  background:var(--glass);
  backdrop-filter:var(--blur);
  color:#fff;
}

/* 🔹 ICON GRID */
.apps{
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  max-width:360px;
}

.app{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-decoration:none;
  color:white;
  font-size:12px;
}

.app img{
  width:52px;
  height:52px;
  border-radius:14px;
  padding:8px;
  background:var(--glass);
  backdrop-filter:var(--blur);
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  opacity:.6;
}
</style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="top">
    <div class="weather">☁ 11°C</div>
    <div>⚙</div>
  </div>

  <!-- CLOCK -->
  <div class="clock">
    <div id="time">00:00</div>
    <div id="date">Loading...</div>
  </div>

  <!-- SEARCH -->
  <div class="search">
    <input placeholder="Search Google..."
      onkeydown="if(event.key==='Enter')location.href='https://www.google.com/search?q='+this.value">
  </div>

  <!-- APPS -->
  <div class="apps">
    <a class="app" href="https://youtube.com">
      <img src="icons/youtube.png"><span>YouTube</span>
    </a>
    <a class="app" href="https://telegram.org">
      <img src="icons/telegram.png"><span>Telegram</span>
    </a>
    <a class="app" href="https://chat.openai.com">
      <img src="icons/chatgpt.png"><span>ChatGPT</span>
    </a>
    <a class="app" href="https://google.com">
      <img src="icons/google.png"><span>Google</span>
    </a>
  </div>

  <div class="footer">⚡ Focus Home • Minimal • Offline</div>

</div>

<script>
function updateClock(){
  const d=new Date();
  document.getElementById('time').innerText=
    d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  document.getElementById('date').innerText=
    d.toDateString();
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
