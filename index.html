<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Home Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ========== THEME ========== */
:root{
  --glass: rgba(0,0,0,.45);
  --blur: blur(14px);
}

/* ========== BASE ========== */
*{box-sizing:border-box}
body{
  margin:0;
  height:100vh;
  font-family:Poppins,sans-serif;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
    url("wall.jpg") center/cover no-repeat;
  color:#fff;
}

/* ========== LAYOUT ========== */
.container{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
}

/* ========== TOP ========== */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.weather{
  background:var(--glass);
  backdrop-filter:var(--blur);
  padding:8px 14px;
  border-radius:20px;
  font-size:14px;
}

/* ========== CLOCK ========== */
.clock{
  text-align:center;
  margin-top:40px;
}
#time{
  font-size:52px;
  font-weight:600;
  text-shadow:0 0 22px rgba(0,255,255,.7);
}
#date{
  opacity:.7;
  margin-top:6px;
}

/* ========== SEARCH ========== */
.search{
  margin:35px auto 0;
  width:100%;
  max-width:380px;
}
.search input{
  width:100%;
  padding:16px;
  border-radius:18px;
  border:none;
  outline:none;
  font-size:16px;
  background:var(--glass);
  backdrop-filter:var(--blur);
  color:#fff;
  caret-color:#00ffff;
  -webkit-text-security:none; /* keyboard normal */
}

/* ========== FOOTER ========== */
.footer{
  text-align:center;
  font-size:12px;
  opacity:.6;
}
</style>
</head>

<body>
<div class="container">

  <!-- TOP -->
  <div class="top">
    <div class="weather">☁ 11°C</div>
    <div>⚙</div>
  </div>

  <!-- CLOCK -->
  <div class="clock">
    <div id="time">00:00</div>
    <div id="date">Loading...</div>
  </div>

  <!-- SEARCH -->
  <div class="search">
    <input id="search"
      placeholder="Search Google..."
      onkeydown="if(event.key==='Enter')location.href='https://www.google.com/search?q='+this.value">
  </div>

  <div class="footer">⚡ Focus Home • Offline • Script Safe</div>
</div>

<script>
/* =====================================================
   CLOCK (LIVE)
   ===================================================== */
function clock(){
  const d=new Date();
  time.innerText=d.toLocaleTimeString([],{
    hour:'2-digit',minute:'2-digit'
  });
  date.innerText=d.toDateString();
}
setInterval(clock,1000); clock();

/* =====================================================
   RAINBOW + SMART GLOW ENGINE
   ===================================================== */
let hue=0,last=Date.now();
const search=document.getElementById("search");

function nextColor(){
  hue=(hue+18)%360; // 🔧 speed control
  return `hsl(${hue},100%,60%)`;
}

search.addEventListener("input",()=>{
  const now=Date.now();
  const speed=now-last;
  last=now;

  const glow=Math.max(12,Math.min(45,400/speed));
  const color=nextColor();

  search.style.color=color;
  search.style.boxShadow=`
    0 0 ${glow}px ${color},
    0 0 ${glow*2}px ${color}
  `;
});

/* =====================================================
   OFFLINE CACHE (AUTO)
   ===================================================== */
if("serviceWorker"in navigator){
  const sw=`
    self.addEventListener('install',e=>{
      e.waitUntil(
        caches.open('focus-home').then(c=>
          c.addAll(['./','wall.jpg'])
        )
      )
    });
    self.addEventListener('fetch',e=>{
      e.respondWith(
        caches.match(e.request).then(r=>r||fetch(e.request))
      )
    });
  `;
  const blob=new Blob([sw],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>
</body>
</html>
