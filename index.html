<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shishupal OS • Ultra</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ================= VARIABLES ================= */
:root {
  --neon: #00ffd5;
  --neon-secondary: #bd00ff;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
  --text: #ffffff;
}

/* ================= RESET & BASE ================= */
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}

body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #000;
  color: var(--text);
  overflow: hidden; /* No scrollbars */
  transition: background 0.5s ease;
}

/* ================= LIVE WALLPAPER (VIDEO/IMG) ================= */
#bg-video {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
  z-index: -1;
  object-fit: cover;
  filter: brightness(0.6); /* Darken for readability */
}

/* Fallback Image if video fails or user sets image */
body.static-bg {
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* ================= UI LAYOUT ================= */
.container {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 20px;
  position: relative;
  z-index: 2;
}

/* ================= TOP BAR ================= */
.top-bar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 5px;
}

.weather-badge {
  background: var(--glass);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  padding: 8px 16px;
  border-radius: 30px;
  border: 1px solid var(--glass-border);
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.settings-btn {
  font-size: 22px;
  cursor: pointer;
  transition: transform 0.5s ease;
  padding: 10px;
}
.settings-btn:hover { transform: rotate(90deg); color: var(--neon); }

/* ================= MAIN CONTENT (3D TILT) ================= */
.center-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 500px;
  perspective: 1000px; /* For 3D effect */
}

/* ================= GREETING & CLOCK ================= */
.greeting {
  font-size: 16px;
  color: var(--neon);
  margin-bottom: 5px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 700;
  text-shadow: 0 0 10px rgba(0, 255, 213, 0.4);
}

.clock-card {
  text-align: center;
  margin-bottom: 40px;
  cursor: grab;
  transition: transform 0.1s;
}

#time {
  font-size: 72px;
  font-weight: 800;
  background: linear-gradient(to bottom, #fff, #aaa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
}

#date {
  font-size: 16px;
  opacity: 0.8;
  letter-spacing: 1px;
}

/* ================= ULTRA SEARCH BAR ================= */
.search-wrapper {
  position: relative;
  width: 100%;
  transition: transform 0.2s ease;
}

.search-box {
  width: 100%;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 25px;
  padding: 18px 50px 18px 25px;
  color: #fff;
  font-size: 18px;
  box-shadow: 
    0 10px 40px rgba(0,0,0,0.4),
    inset 0 0 0 1px rgba(255,255,255,0.1);
  transition: all 0.3s ease;
}

.search-box:focus {
  background: rgba(0, 0, 0, 0.8);
  box-shadow: 
    0 15px 50px rgba(0, 255, 213, 0.15),
    inset 0 0 0 1px var(--neon);
  transform: scale(1.02);
}

/* Voice Icon */
.voice-icon {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: #aaa;
  cursor: pointer;
  font-size: 20px;
  transition: 0.3s;
}
.voice-icon:hover { color: var(--neon); }
.voice-icon.listening { color: #ff0055; animation: pulse 1s infinite; }

@keyframes pulse {
  0% { transform: translateY(-50%) scale(1); }
  50% { transform: translateY(-50%) scale(1.2); }
  100% { transform: translateY(-50%) scale(1); }
}

/* ================= SPEED DIAL (QUICK LINKS) ================= */
.speed-dial {
  display: flex;
  gap: 20px;
  margin-top: 40px;
}

.app-icon {
  width: 50px;
  height: 50px;
  background: var(--glass);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  color: #fff;
  border: 1px solid var(--glass-border);
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  cursor: pointer;
  text-decoration: none;
}

.app-icon:hover {
  background: var(--neon);
  color: #000;
  transform: translateY(-10px) scale(1.1);
  box-shadow: 0 10px 20px rgba(0, 255, 213, 0.3);
}

/* ================= HIDDEN INPUT ================= */
input[type="file"] { display: none; }

</style>
</head>

<body>

<video autoplay muted loop id="bg-video">
  <source src="https://joy1.videvo.net/videvo_files/converted/2021_04/large_watermarked/210419_01_DyingLight_4k_023_preview.mp4" type="video/mp4">
</video>

<div class="container">
  
  <div class="top-bar">
    <div class="weather-badge" id="weather">
      <i class="fas fa-cloud"></i> <span>Locating...</span>
    </div>
    <div class="settings-btn" id="settingsBtn" title="Change Wallpaper">
      <i class="fas fa-cog"></i>
    </div>
  </div>

  <div class="center-stage" id="tiltCard">
    
    <div class="clock-card draggable" id="clockBox">
      <div class="greeting" id="greeting">WELCOME BACK</div>
      <div id="time">00:00</div>
      <div id="date">Loading Date...</div>
    </div>

    <div class="search-wrapper draggable" id="searchWrap">
      <input type="text" id="searchInput" class="search-box" placeholder="Ask the universe..." autocomplete="off">
      <i class="fas fa-microphone voice-icon" id="micBtn"></i>
    </div>

    <div class="speed-dial">
      <a href="https://youtube.com" class="app-icon" title="YouTube"><i class="fab fa-youtube"></i></a>
      <a href="https://instagram.com" class="app-icon" title="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="https://chat.openai.com" class="app-icon" title="AI"><i class="fas fa-robot"></i></a>
      <a href="https://github.com" class="app-icon" title="GitHub"><i class="fab fa-github"></i></a>
    </div>

  </div>

  <div style="font-size: 12px; opacity: 0.5; margin-bottom: 10px;">SHISHUPAL OS v2.0</div>

</div>

<input type="file" id="wallPicker" accept="image/*,video/*">

<script>
/* ================= 1. CLOCK & GREETING ================= */
function updateTime() {
  const now = new Date();
  const hours = now.getHours();
  const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const dateStr = now.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
  
  document.getElementById('time').innerText = timeStr;
  document.getElementById('date').innerText = dateStr;

  // Smart Greeting
  let greet = "HELLO";
  if(hours < 12) greet = "GOOD MORNING, SHISHUPAL";
  else if(hours < 18) greet = "GOOD AFTERNOON, SHISHUPAL";
  else greet = "GOOD EVENING, SHISHUPAL";
  
  document.getElementById('greeting').innerText = greet;
}
setInterval(updateTime, 1000);
updateTime();

/* ================= 2. WEATHER (AUTO LOCATION) ================= */
const API_KEY = "f1f5a371042922700734867c52f50526"; // Keep your key
const weatherEl = document.getElementById('weather');

function getLocWeather() {
  if(navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async position => {
      const { latitude, longitude } = position.coords;
      try {
        const req = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&units=metric&appid=${API_KEY}`);
        const data = await req.json();
        weatherEl.innerHTML = `<i class="fas fa-sun"></i> <span>${Math.round(data.main.temp)}°C • ${data.name}</span>`;
      } catch(e) {
        weatherEl.innerHTML = `<i class="fas fa-times"></i> Offline`;
      }
    }, () => {
      // Fallback if permission denied
      weatherEl.innerHTML = `<i class="fas fa-map-marker-alt"></i> GPS Off`;
    });
  }
}
getLocWeather();

/* ================= 3. VOICE SEARCH & TYPING ================= */
const searchInput = document.getElementById('searchInput');
const micBtn = document.getElementById('micBtn');

// Handle Enter Key
searchInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') {
    let val = searchInput.value;
    if(val) window.location.href = `https://www.google.com/search?q=${encodeURIComponent(val)}`;
  }
});

// Voice Logic (Web Speech API)
if ('webkitSpeechRecognition' in window) {
  const recognition = new webkitSpeechRecognition();
  recognition.continuous = false;
  recognition.lang = "en-US";

  micBtn.onclick = () => {
    recognition.start();
    micBtn.classList.add('listening');
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    searchInput.value = transcript;
    micBtn.classList.remove('listening');
    // Auto search after 1 second
    setTimeout(() => {
       window.location.href = `https://www.google.com/search?q=${encodeURIComponent(transcript)}`;
    }, 800);
  };
  
  recognition.onend = () => micBtn.classList.remove('listening');
} else {
  micBtn.style.display = 'none'; // Hide if not supported
}

/* ================= 4. WALLPAPER ENGINE (VIDEO + IMG) ================= */
const wallPicker = document.getElementById('wallPicker');
const bgVideo = document.getElementById('bg-video');
const settingsBtn = document.getElementById('settingsBtn');

settingsBtn.onclick = () => wallPicker.click();

// Load Saved
const savedWall = localStorage.getItem('ultraWall');
const savedType = localStorage.getItem('ultraWallType'); // 'video' or 'image'

if(savedWall) {
  if(savedType === 'video') {
    bgVideo.src = savedWall;
    bgVideo.style.display = 'block';
  } else {
    bgVideo.style.display = 'none';
    document.body.style.backgroundImage = `url(${savedWall})`;
    document.body.classList.add('static-bg');
  }
}

wallPicker.onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  
  if(file.type.startsWith('video/')) {
    bgVideo.src = url;
    bgVideo.style.display = 'block';
    document.body.style.backgroundImage = 'none';
    localStorage.setItem('ultraWallType', 'video');
  } else {
    bgVideo.style.display = 'none';
    document.body.style.backgroundImage = `url(${url})`;
    document.body.classList.add('static-bg');
    // Convert image to base64 to save (simple method)
    const reader = new FileReader();
    reader.onload = () => {
        localStorage.setItem('ultraWall', reader.result);
        localStorage.setItem('ultraWallType', 'image');
    }
    reader.readAsDataURL(file);
    return; // Exit here to wait for reader
  }
  
  // Note: Saving large video blobs to localStorage fails. 
  // Ideally, use IndexedDB for videos, but for now we rely on browser cache or objectURL for session.
};

/* ================= 5. 3D TILT EFFECT (MOUSE MOVE) ================= */
const card = document.getElementById('tiltCard');
document.addEventListener('mousemove', (e) => {
  const x = (window.innerWidth / 2 - e.pageX) / 25;
  const y = (window.innerHeight / 2 - e.pageY) / 25;
  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* ================= 6. DRAG LOGIC REFINED ================= */
// Simple drag implementation
function dragElement(elmnt) {
  var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
  
  // Double click/tap to enable drag mode visual
  elmnt.ondblclick = function() {
      elmnt.style.cursor = "move";
      elmnt.style.border = "1px dashed var(--neon)";
      elmnt.onmousedown = dragMouseDown;
  };

  function dragMouseDown(e) {
    e = e || window.event;
    e.preventDefault();
    pos3 = e.clientX;
    pos4 = e.clientY;
    document.onmouseup = closeDragElement;
    document.onmousemove = elementDrag;
  }

  function elementDrag(e) {
    e = e || window.event;
    e.preventDefault();
    pos1 = pos3 - e.clientX;
    pos2 = pos4 - e.clientY;
    pos3 = e.clientX;
    pos4 = e.clientY;
    elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
    elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
    elmnt.style.position = "absolute"; // Switch to absolute on drag
  }

  function closeDragElement() {
    document.onmouseup = null;
    document.onmousemove = null;
    elmnt.style.border = "none";
    elmnt.style.cursor = "grab";
  }
}

// Enable drag for specific elements
dragElement(document.getElementById("clockBox"));
dragElement(document.getElementById("searchWrap"));

</script>
</body>
</html>
