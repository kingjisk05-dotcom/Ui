<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shishupal Home UI</title>

<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
/* ================= USER EDIT ZONE ================= */
:root{
  --neon:#00ffd5;
  --glass:rgba(0,0,0,.38);
}
/* ================================================= */

*{
  box-sizing:border-box;
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}

input,textarea{
  -webkit-user-select:text;
  user-select:text;
}

/* ================= BODY (PERFECT WALLPAPER) ================= */
body{
  margin:0;
  min-height:100vh;
  font-family:system-ui, sans-serif;

  background-image:url("wall.jpg");

  background-size:cover;               /* 🔑 auto fit */
  background-position:center center;   /* 🔑 center lock */
  background-repeat:no-repeat;
  background-attachment:fixed;         /* 🔑 move nahi kare */

  image-rendering:auto;
  image-rendering:-webkit-optimize-contrast;

  color:#fff;
}

/* Tall mobile safety */
@media (max-aspect-ratio: 3/4){
  body{ background-position:center top; }
}

/* ================= LAYOUT ================= */
.container{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:18px;
}

/* ================= TOP ================= */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding-top:12px;
}

.weather{
  padding:6px 14px;
  border-radius:20px;
  background:var(--glass);
  backdrop-filter:blur(10px);
  font-size:14px;
}

/* ================= SETTINGS ================= */
#settingsBtn{
  font-size:20px;
  cursor:pointer;
  opacity:.85;
}
#settingsBtn:active{transform:scale(.9)}

/* ================= DRAGGABLE ================= */
.draggable{
  position:fixed;
  touch-action:none;
  cursor:grab;
  z-index:999;
}

/* ================= CLOCK ================= */
.clock{text-align:center;margin-top:40px}
#time{
  font-size:56px;
  font-weight:700;
}
#date{opacity:.7;margin-top:6px}

/* ================= SEARCH ================= */
.search{
  margin:30px auto 0;
  width:100%;
  max-width:380px;
}
.search input{
  width:100%;
  padding:16px;
  border:none;
  outline:none;
  border-radius:18px;

  background:rgba(0,0,0,.35);
  backdrop-filter:blur(14px);

  font-size:17px;
  color:white;
  caret-color:var(--neon);

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.08),
    0 0 18px rgba(0,255,213,.25);

  transition:box-shadow .3s ease, background .3s ease;
  -webkit-text-security:none;
}

/* ================= FOOTER ================= */
.footer{
  text-align:center;
  font-size:12px;
  opacity:.6;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top">
  <div class="weather" id="weather">⛅ Loading…</div>
  <div id="settingsBtn">⚙</div>
</div>

<input type="file" id="wallPicker" accept="image/*" hidden>

<div class="container">

  <!-- CLOCK -->
  <div class="clock draggable" id="clock">
    <div id="time">00:00</div>
    <div id="date">Loading…</div>
  </div>

  <!-- SEARCH -->
  <div class="search draggable" id="searchBox">
    <input id="search"
      type="search"
      inputmode="search"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      placeholder="Search Google…">
  </div>

<script>
/* ================= CLOCK ================= */
function updateClock(){
  const d=new Date();
  time.textContent=d.toLocaleTimeString([],{
    hour:'2-digit',minute:'2-digit'
  });
  date.textContent=d.toDateString();
}
setInterval(updateClock,1000);updateClock();

/* ===== SMART CLOCK COLOR (REFRESH ANIMATION) ===== */
(function(){
  const t=document.getElementById("time");
  const base=Math.floor(Math.random()*260+40);
  let c=base-40,s=40;
  const a=setInterval(()=>{
    c++;
    t.style.color=`hsl(${c},100%,65%)`;
    t.style.textShadow=`0 0 28px hsl(${c},100%,60%)`;
    if(--s<=0)clearInterval(a);
  },20);
})();

/* ================= RGB TYPING ================= */
const input=document.getElementById("search");
let lastType=Date.now();
input.addEventListener("input",()=>{
  const now=Date.now();
  const speed=Math.min(300,now-lastType);
  lastType=now;

  const hue=Math.floor(Math.random()*360);
  const glow=Math.max(10,40-speed/8);

  input.style.color=`hsl(${hue},100%,72%)`;
  input.style.textShadow=`0 0 ${glow}px hsl(${hue},100%,65%)`;
  input.style.boxShadow=`0 0 ${glow}px hsl(${hue},100%,60%)`;
});

/* ================= SEARCH ================= */
input.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    location.href="https://www.google.com/search?q="+
      encodeURIComponent(input.value);
  }
});

/* ================= WEATHER ================= */
const API_KEY="f1f5a371042922700734867c52f50526";
async function loadWeather(){
  try{
    const r=await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=Yamunanagar,IN&units=metric&appid=${API_KEY}`
    );
    const d=await r.json();
    weather.textContent=`⛅ ${Math.round(d.main.temp)}°C • Yamunanagar`;
  }catch{
    weather.textContent="Weather offline";
  }
}
loadWeather();setInterval(loadWeather,600000);

/* ================= DRAG ENGINE (DOUBLE TAP) ================= */
function makeDraggable(el,key){
  const p=JSON.parse(localStorage.getItem(key));
  if(p){el.style.left=p.x+"px";el.style.top=p.y+"px";}
  let enabled=false,lastTap=0,sx,sy,ix,iy;

  el.addEventListener("pointerdown",e=>{
    const now=Date.now();
    if(now-lastTap<300){
      enabled=!enabled;
      el.style.boxShadow=enabled?"0 0 25px rgba(0,255,213,.9)":"none";
    }
    lastTap=now;
    if(!enabled)return;
    sx=e.clientX;sy=e.clientY;
    ix=el.offsetLeft;iy=el.offsetTop;
    el.setPointerCapture(e.pointerId);
  });

  el.addEventListener("pointermove",e=>{
    if(!enabled)return;
    el.style.left=ix+(e.clientX-sx)+"px";
    el.style.top=iy+(e.clientY-sy)+"px";
  });

  el.addEventListener("pointerup",()=>{
    if(!enabled)return;
    localStorage.setItem(key,JSON.stringify({
      x:el.offsetLeft,y:el.offsetTop
    }));
    el.style.boxShadow="none";
    enabled=false;
  });
}
makeDraggable(clock,"pos_clock");
makeDraggable(searchBox,"pos_search");

/* ================= WALLPAPER PICKER ================= */
const savedWall=localStorage.getItem("userWallpaper");
if(savedWall){
  document.body.style.backgroundImage=`url(${savedWall})`;
}
settingsBtn.onclick=()=>wallPicker.click();
wallPicker.onchange=e=>{
  const f=e.target.files[0];
  if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    localStorage.setItem("userWallpaper",r.result);
    document.body.style.backgroundImage=`url(${r.result})`;
  };
  r.readAsDataURL(f);
};

/* ================= BLOCK COPY / MENU ================= */
document.addEventListener("contextmenu",e=>e.preventDefault());
["copy","cut","paste"].forEach(x=>{
  document.addEventListener(x,e=>e.preventDefault());
});
document.addEventListener("selectstart",e=>{
  if(!e.target.closest("input"))e.preventDefault();
});
</script>

</body>
</html>l>
