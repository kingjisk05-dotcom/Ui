<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shishupal Home UI</title>

<style>
:root{
  --neon:#00ffd5;
  --glass:rgba(0,0,0,.38);
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  font-family:system-ui, sans-serif;
  background:url("wall.jpg") center/cover no-repeat;
  color:#fff;
}

.container{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:18px;
}

/* ---------- TOP ---------- */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.weather{
  padding:6px 14px;
  border-radius:20px;
  background:var(--glass);
  backdrop-filter:blur(10px);
  font-size:14px;
}

/* ---------- CLOCK ---------- */
.clock{
  text-align:center;
  margin-top:40px;
}

#time{
  font-size:56px;
  font-weight:700;
  color:var(--neon);
  text-shadow:0 0 25px var(--neon);
}

#date{
  opacity:.7;
  margin-top:6px;
}

/* ---------- SEARCH ---------- */
.search{
  margin:30px auto 0;
  width:100%;
  max-width:380px;
}

.search input{
  width:100%;
  padding:16px;
  border:none;
  outline:none;
  border-radius:18px;
  background:var(--glass);
  backdrop-filter:blur(12px);
  font-size:17px;
  color:white;
  caret-color:var(--neon);
  -webkit-text-security:none;
}

/* ---------- DRAG SUPPORT ---------- */
.draggable{
  position:fixed;
  touch-action:none;
  cursor:grab;
  z-index:999;
}

/* ---------- FOOTER ---------- */
.footer{
  text-align:center;
  font-size:12px;
  opacity:.6;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="top">
    <div class="weather" id="weather">⛅ Loading…</div>
    <div>⚙</div>
  </div>

  <!-- CLOCK -->
  <div class="clock draggable" id="clock">
    <div id="time">00:00</div>
    <div id="date">Loading…</div>
  </div>

  <!-- SEARCH -->
  <div class="search draggable" id="searchBox">
    <input id="search"
      type="search"
      inputmode="search"
      autocomplete="off"
      placeholder="Search Google…">
  </div>

  <div class="footer">⚡ Focus Home • Clean • Offline Ready</div>

</div>

<script>
/* ================= CLOCK ================= */
function updateClock(){
  const d=new Date();
  time.textContent=d.toLocaleTimeString([],{
    hour:'2-digit',minute:'2-digit'
  });
  date.textContent=d.toDateString();
}
setInterval(updateClock,1000);
updateClock();

/* ================= RGB TYPING ================= */
const input=document.getElementById("search");
let lastType=Date.now();

input.addEventListener("input",()=>{
  const now=Date.now();
  const speed=Math.min(300, now-lastType);
  lastType=now;

  const hue=Math.floor(Math.random()*360);
  const glow=Math.max(6, 30 - speed/10);

  input.style.color=`hsl(${hue},100%,70%)`;
  input.style.textShadow=`0 0 ${glow}px hsl(${hue},100%,70%)`;
});

/* ================= SEARCH ================= */
input.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    location.href=
      "https://www.google.com/search?q="+
      encodeURIComponent(input.value);
  }
});

/* ================= WEATHER ================= */
const API_KEY="f1f5a371042922700734867c52f50526";
const CITY="Yamunanagar";
const COUNTRY="IN";

async function loadWeather(){
  try{
    const res=await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${CITY},${COUNTRY}&units=metric&appid=${API_KEY}`
    );
    const data=await res.json();
    weather.textContent=
      `⛅ ${Math.round(data.main.temp)}°C • ${CITY}`;
  }catch{
    weather.textContent="Weather offline";
  }
}
loadWeather();
setInterval(loadWeather,10*60*1000);

/* ================= DRAG ENGINE ================= */
function makeDraggable(el,key){
  const saved=JSON.parse(localStorage.getItem(key));
  if(saved){
    el.style.left=saved.x+"px";
    el.style.top=saved.y+"px";
  }

  let sx,sy,ix,iy;

  el.addEventListener("pointerdown",e=>{
    sx=e.clientX;
    sy=e.clientY;
    ix=el.offsetLeft;
    iy=el.offsetTop;
    el.setPointerCapture(e.pointerId);
    el.style.cursor="grabbing";
  });

  el.addEventListener("pointermove",e=>{
    if(sx==null)return;
    el.style.left=ix+(e.clientX-sx)+"px";
    el.style.top =iy+(e.clientY-sy)+"px";
  });

  el.addEventListener("pointerup",()=>{
    el.style.cursor="grab";
    localStorage.setItem(key,JSON.stringify({
      x:el.offsetLeft,
      y:el.offsetTop
    }));
    sx=null;
  });
}

makeDraggable(clock,"pos_clock");
makeDraggable(searchBox,"pos_search");
</script>

</body>
</html>
