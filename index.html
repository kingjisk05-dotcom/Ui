<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Home Pro</title>

<style>
:root{
  --glass: rgba(0,0,0,0.45);
  --blur: blur(14px);
  --accent: #00ffd5;
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  font-family: system-ui, -apple-system, Segoe UI, sans-serif;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
    url("wall.jpg") center/cover no-repeat;
  color:#fff;
}

/* ===== LAYOUT ===== */
.container{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
}

/* ===== TOP BAR ===== */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.weather{
  background:var(--glass);
  backdrop-filter:var(--blur);
  padding:8px 14px;
  border-radius:20px;
  font-size:14px;
}

/* ===== CLOCK ===== */
.clock{
  text-align:center;
  margin-top:40px;
}

#time{
  font-size:52px;
  font-weight:600;
  letter-spacing:2px;
  color:var(--accent);
  text-shadow:0 0 25px rgba(0,255,210,.7);
}

#date{
  opacity:.7;
  margin-top:6px;
}

/* ===== SEARCH ===== */
.search{
  margin:35px auto 0;
  width:100%;
  max-width:380px;
}

.rgb-wrapper{
  position:relative;
  background:var(--glass);
  backdrop-filter:var(--blur);
  border-radius:16px;
  padding:15px;
}

.real-input{
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  color:transparent;
  caret-color:var(--accent);
  font-size:16px;
  position:relative;
  z-index:2;

  /* keyboard fix */
  inputmode:text;
}

.rgb-text{
  position:absolute;
  top:50%;
  left:15px;
  transform:translateY(-50%);
  display:flex;
  gap:1px;
  pointer-events:none;
  font-size:16px;
  white-space:nowrap;
}

/* ===== FOOTER ===== */
.footer{
  text-align:center;
  font-size:12px;
  opacity:.6;
  margin-bottom:8px;
}
</style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="top">
    <div class="weather">☁ 11°C</div>
    <div>⚙</div>
  </div>

  <!-- CLOCK -->
  <div class="clock">
    <div id="time">00:00</div>
    <div id="date">Loading...</div>
  </div>

  <!-- SEARCH -->
  <div class="search">
    <div class="rgb-wrapper">
      <div id="rgbInput" class="rgb-text"></div>
      <input
        id="realInput"
        class="real-input"
        type="text"
        placeholder="Search Google..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false">
    </div>
  </div>

  <div class="footer">⚡ Focus Home • Minimal • Offline</div>

</div>

<script>
/* ===== CLOCK ===== */
function updateClock(){
  const d=new Date();
  document.getElementById('time').innerText =
    d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  document.getElementById('date').innerText =
    d.toDateString();
}
setInterval(updateClock,1000);
updateClock();

/* ===== RGB SEARCH TEXT ===== */
const input = document.getElementById('realInput');
const rgb = document.getElementById('rgbInput');

input.addEventListener('input', () => {
  rgb.innerHTML = '';
  [...input.value].forEach(ch => {
    const span = document.createElement('span');
    span.textContent = ch;
    span.style.color = `hsl(${Math.random()*360},100%,65%)`;
    rgb.appendChild(span);
  });
});

/* ===== GOOGLE SEARCH ===== */
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    location.href =
      'https://www.google.com/search?q=' +
      encodeURIComponent(input.value);
  }
});
</script>

</body>
</html>
